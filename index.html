<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyKart</title>

<style>
body{margin:0;font-family:Arial;background:#eaeded}

/* NAVBAR */
.navbar{
 background:#131921;color:white;
 display:flex;align-items:center;
 justify-content:space-between;
 padding:10px;
}
.menu{font-size:22px;cursor:pointer}
.logo{color:#ff9900;font-weight:bold;font-size:20px}
.search input{
 padding:8px;border:none;border-radius:4px;
 width:180px;
}

/* SIDE PANEL */
#sideMenu{
 position:fixed;
 top:0;left:0;
 width:40%;max-width:300px;
 height:100%;
 background:white;
 transform:translateX(-100%);
 transition:0.3s;
 z-index:1000;
 padding:20px;
}
#sideMenu.active{transform:translateX(0)}

#overlay{
 position:fixed;
 top:0;left:0;
 width:100%;height:100%;
 background:rgba(0,0,0,0.5);
 display:none;
}

/* LOGIN */
#loginBox{
 display:none;
 position:fixed;
 top:50%;left:50%;
 transform:translate(-50%,-50%);
 background:white;
 padding:20px;border-radius:10px;
 z-index:2000;
}

/* PRODUCTS */
.container{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
 gap:15px;padding:15px;
}
.card{
 background:white;padding:10px;
 border-radius:10px;text-align:center;
}
.card img{
 width:100%;height:150px;object-fit:cover;
}
.price{color:#b12704;font-weight:bold}

button{
 background:#ffd814;border:none;
 padding:8px;width:100%;cursor:pointer;
}

.menu p{
 cursor:pointer;
 margin:5px 0;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
 <div class="menu" onclick="openMenu()">☰</div>
 <div class="logo">StudyKart</div>
 <div class="search">
   <input type="text" placeholder="Search..." onkeyup="searchProduct()" id="search">
 </div>
 <div onclick="openLogin()">👤</div>
</div>

<!-- OVERLAY -->
<div id="overlay" onclick="closeMenu()"></div>

<!-- SIDE PANEL -->
<div id="sideMenu">
 <h3>📌 Menu</h3>

 <h4>🔥 Trending</h4>
 <p onclick="filterProduct('')">Show All</p>
 <p onclick="filterProduct('book')">Books</p>
 <p onclick="filterProduct('calculator')">Calculator</p>
 <p onclick="filterProduct('lamp')">Study Lamp</p>

 <hr>

 <h4>👤 Account</h4>
 <p onclick="openLogin()">Sign In</p>
 <p>Your Account</p>
 <p onclick="aboutus()">About Us</p>

 <br>
 <button onclick="closeMenu()">Close</button>
</div>

<!-- LOGIN -->
<div id="loginBox">
 <h3>Login</h3>
 <button>Login with Google</button>
 <br><br>
 <button onclick="closeLogin()">Close</button>
</div>

<!-- PRODUCTS -->
<div class="container" id="products">

<div class="card" data-category="book">
<img src="https://m.media-amazon.com/images/I/51ssbKdZBxL._SY342_.jpg">
<h3>NCERT Science Book Class 9</h3>
<p class="price">₹210</p>
<a href="https://www.amazon.in/NCERT-SCIENCE-BOOK-CLASS-IX-9th/dp/B08KS385MB" target="_blank">
<button>Check Price</button>
</a>
</div>

<div class="card" data-category="book">
<img src="https://m.media-amazon.com/images/I/71sduHKX8aL._SY385_.jpg">
<h3>Oswaal Question Bank (Set of 2)</h3>
<p class="price">₹828</p>
<a href="https://www.amazon.in/Mathematics-Chapter-wise-Topic-wise-Competency-Comprehensive/dp/9377137675" target="_blank">
<button>Check Price</button>
</a>
</div>

<div class="card" data-category="calculator">
<img src="https://m.media-amazon.com/images/I/71drqWPeL0L._SY450_.jpg">
<h3>Scientific Calculator (240 Functions)</h3>
<p class="price">₹499</p>
<a href="https://www.amazon.in/Scientific-Calculator-Engineering-Competitive-Preparation/dp/B0GNSDB6J4" target="_blank">
<button>Check Price</button>
</a>
</div>

<div class="card" data-category="lamp">
<img src="https://m.media-amazon.com/images/I/615CD0+PNUL._SX342_.jpg">
<h3>LED Study Lamp with Holder</h3>
<p class="price">₹999</p>
<a href="https://www.amazon.in/One94Store-Desk-Lamp-Phone-Holder/dp/B0FR58SSFP" target="_blank">
<button>Check Price</button>
</a>
</div>

</div>

<script>
// PANEL
function openMenu(){
 document.getElementById("sideMenu").classList.add("active");
 document.getElementById("overlay").style.display="block";
}
function closeMenu(){
 document.getElementById("sideMenu").classList.remove("active");
 document.getElementById("overlay").style.display="none";
}

// LOGIN
function openLogin(){
 document.getElementById("loginBox").style.display="block";
}
function closeLogin(){
 document.getElementById("loginBox").style.display="none";
}

// SEARCH
function searchProduct(){
 let input=document.getElementById("search").value.toLowerCase();
 let cards=document.getElementsByClassName("card");

 for(let i=0;i<cards.length;i++){
   let text=cards[i].innerText.toLowerCase();
   cards[i].style.display=text.includes(input)?"block":"none";
 }
}

// FILTER
function filterProduct(category){
 let cards=document.getElementsByClassName("card");

 for(let i=0;i<cards.length;i++){
   let cat=cards[i].getAttribute("data-category");

   if(category=="" || cat.includes(category)){
     cards[i].style.display="block";
   } else {
     cards[i].style.display="none";
   }
 }
}
</script>

</body>
</html>
